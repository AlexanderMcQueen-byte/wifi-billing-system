version: '3.8'

services:
  mongo:
    image: docker.io/library/mongo:6
    container_name: wifi-billing-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    container_name: wifi-billing-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/wifi_billing
    depends_on:
      - mongo
    networks:
      - webnet

  nginx:
    image: nginx:stable
    container_name: wifi-billing-nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./deploy/nginx/wifi-billing.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./deploy/nginx/www:/var/www/letsencrypt
    depends_on:
      - app
    networks:
      - webnet

  certbot:
    image: quay.io/letsencrypt/letsencrypt:latest
    container_name: wifi-billing-certbot
    command: 
      - --agree-tos --no-eff-email --email ${LETSENCRYPT_EMAIL} --webroot -w /var/www/letsencrypt -d ${DOMAIN} certonly
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./deploy/nginx/www:/var/www/letsencrypt
    depends_on:
      - nginx
    networks:
      - webnet

volumes:
  mongo-data:
  certbot-etc:
  certbot-var:

networks:
  webnet:
    driver: bridge
